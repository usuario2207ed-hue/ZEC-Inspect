<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZEC Inspect 🖥️</title>

<link rel="manifest" href="manifest.json">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#ffffff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:32px;
    font-weight:bold;
    animation:cores 5s infinite;
}

@keyframes cores{

    0%{color:#0066ff;}
    25%{color:#00aa55;}
    50%{color:#ff6600;}
    75%{color:#aa00ff;}
    100%{color:#0066ff;}

}

.wave{
    animation:onda 30s infinite;
}

@keyframes onda{

    0%{transform:translateY(0px);}
    10%{transform:translateY(-2px);}
    20%{transform:translateY(0px);}
    30%{transform:translateY(2px);}
    40%{transform:translateY(0px);}
    50%{transform:translateY(-2px);}
    60%{transform:translateY(0px);}
    70%{transform:translateY(2px);}
    80%{transform:translateY(0px);}
    90%{transform:translateY(-2px);}
    100%{transform:translateY(0px);}

}

.form-group{
    margin-bottom:18px;
}

label{
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
}

.help{
    width:20px;
    height:20px;
    border-radius:50%;
    background:#007bff;
    color:#fff;
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
}

.help:hover::after{

    content:attr(data-help);
    position:absolute;
    top:30px;
    left:0;
    width:220px;
    background:#222;
    color:#fff;
    padding:10px;
    border-radius:8px;
    font-size:12px;
    z-index:999;

}

input,
select,
textarea{

    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;

}

textarea{
    resize:none;
    height:100px;
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:25px;
}

button{

    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;

}

button:hover{
    opacity:0.85;
}

.btn-save{
    background:#00aa55;
    color:#fff;
}

.btn-clear{
    background:#ff4444;
    color:#fff;
}

.btn-export{
    background:#0066ff;
    color:#fff;
}

.historico{
    margin-top:35px;
}

.historico h2{
    text-align:center;
    margin-bottom:15px;
}

.card{

    background:#f8f8f8;
    border:1px solid #ddd;
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;

}

.card strong{
    color:#0066ff;
}

footer{

    margin-top:30px;
    text-align:center;
    color:#555;
    font-size:14px;

}

#outroResponsavel{
    display:none;
}

@media(max-width:600px){

    h1{
        font-size:24px;
    }

    button{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="container">

<h1 id="titulo"></h1>

<div class="form-group">

<label>

👨‍🔧 Responsável

<span class="help"
data-help="Selecione o responsável pela medição.">
?
</span>

</label>

<select id="responsavel"
onchange="verificarResponsavel()">

<option value="">Selecione</option>

<option>Edmilson</option>
<option>Emerson</option>
<option>Lauro</option>
<option>(Outros)</option>

</select>

</div>

<div class="form-group"
id="outroResponsavel">

<label>

✍️ Nome do Responsável

</label>

<input type="text"
id="nomeOutroResponsavel">

</div>

<div class="form-group">

<label>

⚙️ Equipamentos

<span class="help"
data-help="Selecione o equipamento analisado.">
?
</span>

</label>

<select id="equipamento">

<option value="">Selecione</option>

<option>Painel supervisorio P0 (Ponto A)</option>
<option>Painel supervisorio P0 (Ponto B)</option>
<option>Painel supervisorio P0 (Ponto C)</option>

<option>Mochila Pneumatica 4PBBB (Ponto A)</option>
<option>Mochila Pneumatica 4PBBB (Ponto B)</option>
<option>Mochila Pneumatica 4PBBB (Ponto C)</option>

<option>FANUC 4PBBP 12 (Ponto A)</option>
<option>FANUC 4PBBP 12 (Ponto B)</option>
<option>FANUC 4PBBP 12 (Ponto C)</option>

<option>PLC 4PBB (Ponto A)</option>
<option>PLC 4PBB (Ponto B)</option>
<option>PLC 4PBB (Ponto C)</option>

<option>PAINEL ELETRICO CENTRAL (Ponto A)</option>
<option>PAINEL ELETRICO CENTRAL (Ponto B)</option>
<option>PAINEL ELETRICO CENTRAL (Ponto C)</option>

<option>Motor tunel (Ponto A)</option>
<option>Motor tunel (Ponto B)</option>

<option>Motor transportador principal (Ponto A)</option>
<option>Motor transportador principal (Ponto B)</option>

<option>Motor matagem principal (Ponto A)</option>
<option>Motor matagem principal (Ponto B)</option>

<option>Motor Estufa principal (Ponto A)</option>
<option>Motor Estufa principal (Ponto B)</option>

<option>Reservatório de óleo (Ponto A)</option>
<option>Reservatório de óleo (Ponto B)</option>

</select>

</div>

<div class="form-group">

<label>

🕵️ Visual

<span class="help"
data-help="Selecione a condição visual do equipamento.">
?
</span>

</label>

<select id="visual">

<option value="">Selecione</option>

<option>Normal</option>
<option>Leve desgaste</option>
<option>Ruído anormal</option>
<option>Vazamento</option>
<option>Aquecimento</option>
<option>Vibração elevada</option>
<option>Sujeira excessiva</option>
<option>Oxidação</option>
<option>Cabo danificado</option>
<option>Fixação solta</option>
<option>Alarme ativo</option>
<option>Vazio</option>
<option>Não conforme</option>

</select>

</div>

<div class="form-group">

<label>

🌡️ Temperatura (°C)

<span class="help"
data-help="Digite a temperatura do equipamento.">
?
</span>

</label>

<input type="number"
id="temperatura">

</div>

<div class="form-group">

<label>

📈 Vibração (mm/s)

<span class="help"
data-help="Digite o valor da vibração.">
?
</span>

</label>

<input type="number"
step="0.01"
id="vibracao">

</div>

<div class="form-group">

<label>

⚡ Corrente (A)

<span class="help"
data-help="Digite a corrente elétrica.">
?
</span>

</label>

<input type="number"
step="0.01"
id="corrente">

</div>

<div class="form-group">

<label>

📋 Observação

<span class="help"
data-help="Digite observações importantes.">
?
</span>

</label>

<textarea id="observacao"></textarea>

</div>

<div class="buttons">

<button class="btn-export"
onclick="exportarTXT()">

💾 Exportar TXT

</button>

<button class="btn-clear"
onclick="limparCampos()">

🧹 Limpar Campos

</button>

<button class="btn-save"
onclick="gravarDados()">

💾 Gravar

</button>

</div>

<div class="historico">

<h2>📊 Últimas 5 medições</h2>

<div id="listaMedicoes"></div>

<button class="btn-clear"
onclick="limparHistorico()">

🗑️ Limpar Histórico

</button>

</div>

<footer>

Desenvolvido por Edmilson Charif Elmaes

</footer>

</div>

<script>


const texto =
"Condições básicas do equipamento";

const titulo =
document.getElementById("titulo");

texto.split("").forEach((letra,index)=>{

    const span =
    document.createElement("span");

    span.innerHTML =
    letra === " "
    ? "&nbsp;"
    : letra;

    span.style.display =
    "inline-block";

    span.style.animationDelay =
    `${index * 0.1}s`;

    span.classList.add("wave");

    titulo.appendChild(span);

});


function verificarResponsavel(){

    const responsavel =
    document.getElementById(
    "responsavel").value;

    document.getElementById(
    "outroResponsavel").style.display =

    responsavel === "Outros"
    ? "block"
    : "none";

}

function limparCampos(){

    document.getElementById("responsavel").value = "";

    document.getElementById("nomeOutroResponsavel").value = "";

    document.getElementById("equipamento").value = "";

    document.getElementById("visual").value = "";

    document.getElementById("temperatura").value = "";

    document.getElementById("vibracao").value = "";

    document.getElementById("corrente").value = "";

    document.getElementById("observacao").value = "";

    document.getElementById(
    "outroResponsavel").style.display = "none";

}


function gravarDados(){

    const agora = new Date();

    const dataFormatada =

    agora.toLocaleDateString("pt-BR")
    + " " +
    agora.toLocaleTimeString("pt-BR");

    let responsavel =
    document.getElementById(
    "responsavel").value;

    if(responsavel === "Outros"){

        responsavel =
        document.getElementById(
        "nomeOutroResponsavel").value;

    }

    const equipamento =
    document.getElementById(
    "equipamento").value;

    const visual =
    document.getElementById(
    "visual").value;

    const temperatura =
    document.getElementById(
    "temperatura").value;

    const vibracao =
    document.getElementById(
    "vibracao").value;

    const corrente =
    document.getElementById(
    "corrente").value;

    const observacao =
    document.getElementById(
    "observacao").value;

    if(!responsavel ||
       !equipamento ||
       !visual){

        alert(
        "⚠️ Preencha os campos obrigatórios."
        );

        return;

    }

const conteudo =

`PREDITIVO ZEC

Data/Hora: ${dataFormatada}

Responsável: ${responsavel}

Equipamento: ${equipamento}

Visual: ${visual}

Temperatura: ${temperatura} °C

Vibração: ${vibracao} mm/s

Corrente: ${corrente} A

Observação:
${observacao}

--------------------------------

`;

let historicoTXT =
localStorage.getItem(
"historicoTXT") || "";

historicoTXT += conteudo;

localStorage.setItem(
"historicoTXT",
historicoTXT
);

salvarStorage(
dataFormatada,
responsavel,
equipamento,
temperatura,
vibracao,
corrente
);

alert("✅ Medição gravada.");

limparCampos();

}

function salvarStorage(
dataHora,
responsavel,
equipamento,
temperatura,
vibracao,
corrente
){

let medicoes =
JSON.parse(
localStorage.getItem("medicoes")
) || [];

medicoes.unshift({

dataHora,
responsavel,
equipamento,
temperatura,
vibracao,
corrente

});

medicoes = medicoes.slice(0,5);

localStorage.setItem(
"medicoes",
JSON.stringify(medicoes)
);

mostrarMedicoes();

}


function mostrarMedicoes(){

const lista =
document.getElementById(
"listaMedicoes");

lista.innerHTML = "";

let medicoes =
JSON.parse(
localStorage.getItem("medicoes")
) || [];

medicoes.forEach(item => {

lista.innerHTML += `

<div class="card">

<strong>${item.dataHora}</strong>

<br><br>

👨‍🔧 ${item.responsavel}<br>

⚙️ ${item.equipamento}<br>

🌡️ ${item.temperatura} °C<br>

📈 ${item.vibracao} mm/s<br>

⚡ ${item.corrente} A

</div>

`;

});

}

mostrarMedicoes();

function exportarTXT(){

const historicoTXT =
localStorage.getItem(
"historicoTXT");

if(!historicoTXT){

alert(
"⚠️ Nenhum histórico encontrado."
);

return;

}

const blob =
new Blob(
[historicoTXT],
{ type:"text/plain" }
);

const link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"Historico_Preditivo_ZEC.txt";

link.click();

}


function limparHistorico(){

const confirmar =
confirm(

"⚠️ Tem certeza que deseja apagar todo o histórico?"

);

if(!confirmar){
return;
}

const senha =
prompt(

`🔒 Somente o desenvolvedor Edmilson tem acesso.

Digite a senha:`

);

if(senha === "123456"){

localStorage.removeItem(
"medicoes"
);

localStorage.removeItem(
"historicoTXT"
);

mostrarMedicoes();

alert(
"✅ Histórico apagado com sucesso."
);

}else{

alert(
"❌ Senha incorreta."
);

}

}


async function solicitarPermissaoNotificacao(){

const permissaoSalva =
localStorage.getItem(
"permissaoNotificacao"
);

if(permissaoSalva === "autorizado"){
return;
}

if(Notification.permission !== "granted"){

const permissao =
await Notification.requestPermission();

if(permissao === "granted"){

localStorage.setItem(
"permissaoNotificacao",
"autorizado"
);

}

}

}

const horariosMonitoramento = [

"08:00",
"15:00",
"18:00",
"23:00"

];

function verificarHorarioNotificacao(){

const agora = new Date();

const horaAtual =

agora.getHours()
.toString()
.padStart(2,'0')

+ ":" +

agora.getMinutes()
.toString()
.padStart(2,'0');

const dataHoje =
agora.toLocaleDateString("pt-BR");

let notificacoesEnviadas =

JSON.parse(
localStorage.getItem(
"notificacoesEnviadas"
)
) || {};

horariosMonitoramento.forEach(
horario => {

const chave =
dataHoje + "_" + horario;

if(
horaAtual === horario &&
!notificacoesEnviadas[chave]
){

enviarNotificacao(horario);

notificacoesEnviadas[chave] = true;

localStorage.setItem(
"notificacoesEnviadas",
JSON.stringify(
notificacoesEnviadas
)
);

}

});

}

function enviarNotificacao(horario){

if(Notification.permission === "granted"){

new Notification(

"🔔 Lembrete de Monitoramento",

{

body:
"Horário programado para inspeção preditiva: "
+ horario,

icon:
"https://cdn-icons-png.flaticon.com/512/2920/2920349.png"

}

);

}

}

setInterval(
verificarHorarioNotificacao,
30000
);

solicitarPermissaoNotificacao();


let deferredPrompt;

window.addEventListener(
'beforeinstallprompt',

(e)=>{

e.preventDefault();

deferredPrompt = e;

mostrarBotaoInstalar();

});

function mostrarBotaoInstalar(){

if(document.getElementById(
"btnInstalar"
)) return;

const botao =
document.createElement("button");

botao.id = "btnInstalar";

botao.innerHTML =
"📲 Instalar Aplicativo";

botao.className =
"btn-export";

botao.onclick = async ()=>{

if(deferredPrompt){

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

}

};

document.querySelector(
".buttons"
).appendChild(botao);

}


if('serviceWorker' in navigator){

navigator.serviceWorker
.register('sw.js')

.then(()=>{

console.log(
'Service Worker registrado'
);

})
.catch((erro)=>{

console.log(
'Erro Service Worker:',
erro
);

});

}

</script>

<script>

let deferredPrompt;

window.addEventListener(
'beforeinstallprompt',

(e)=>{

e.preventDefault();

deferredPrompt = e;

mostrarBotaoInstalar();

});

function mostrarBotaoInstalar(){

if(document.getElementById(
"btnInstalar"
)) return;

const botao =
document.createElement("button");

botao.id = "btnInstalar";

botao.innerHTML =
"📲 Instalar Aplicativo";

botao.style.position = "fixed";
botao.style.bottom = "20px";
botao.style.right = "20px";
botao.style.padding = "14px 20px";
botao.style.border = "none";
botao.style.borderRadius = "12px";
botao.style.background = "#0066ff";
botao.style.color = "#fff";
botao.style.fontSize = "16px";
botao.style.fontWeight = "bold";
botao.style.cursor = "pointer";
botao.style.zIndex = "9999";
botao.style.boxShadow =
"0 0 10px rgba(0,0,0,0.3)";

botao.onclick = async ()=>{

if(deferredPrompt){

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

botao.remove();

}

};

document.body.appendChild(botao);

}

if('serviceWorker' in navigator){

navigator.serviceWorker
.register('sw.js')

.then(()=>{

console.log(
'Service Worker registrado'
);

})
.catch((erro)=>{

console.log(
'Erro Service Worker:',
erro
);

});

}

</script>

</body>
</html>
